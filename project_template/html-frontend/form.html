<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>表单示例 - 前端框架模板</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <div class="navbar-brand">
                    <a href="index.html">Logo</a>
                </div>
                <ul class="navbar-nav">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="form.html" class="active">表单</a></li>
                </ul>
                <button class="navbar-toggle" id="navbarToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>表单示例</h1>
                <p class="page-description">这是一个表单提交示例页面</p>
            </div>

            <div class="content-wrapper">
                <div style="max-width: 600px; margin: 0 auto;">
                    <form id="exampleForm">
                        <div class="form-group">
                            <label class="form-label">姓名</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">手机号</label>
                            <input type="tel" class="form-control" name="phone" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">消息</label>
                            <textarea class="form-control" name="message" rows="5" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">提交</button>
                        <button type="reset" class="btn btn-secondary" style="margin-left: 10px;">重置</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 版权所有</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 表单验证示例
        document.getElementById('exampleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // 验证邮箱
            if (!Utils.isValidEmail(data.email)) {
                Utils.showMessage('请输入有效的邮箱地址', 'danger');
                return;
            }
            
            // 验证手机号
            if (!Utils.isValidPhone(data.phone)) {
                Utils.showMessage('请输入有效的手机号', 'danger');
                return;
            }
            
            // 提交表单
            Utils.showMessage('表单提交成功！', 'success');
            console.log('表单数据:', data);
        });
    </script>
</body>
</html>
